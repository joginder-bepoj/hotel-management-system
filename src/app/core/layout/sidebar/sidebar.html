<div>
  <aside id="leftsidebar" class="sidebar">
    <div class="menu">
      <div class="sidebar">
        <ng-scrollbar visibility="hover">
          <ul class="list">

            <!-- Active Hotel Panel -->
            <li class="sidebar-user-panel">
              <div class="user-panel clickable-panel" [matMenuTriggerFor]="hotelMenu">
                <div class="image">
                  <img
                    [src]="activeHotel?.hotel_images?.length ? activeHotel.hotel_images[0] : '/images/logo.avif'"
                    alt="Hotel" class="user-img" />
                </div>
                <div class="profile">
                  <div class="name ms-2">{{activeHotel?.hotel_name || 'Select Hotel'}}</div>
                  <mat-icon class="switch-icon">expand_more</mat-icon>
                </div>
              </div>
            </li>

            <!-- Hotel Switcher Menu -->
            <mat-menu #hotelMenu="matMenu" class="hotel-switch-menu">
              <div class="menu-header">
                <i class="fas fa-city"></i>
                <span>Switch Hotel</span>
              </div>
              <div class="menu-content">
                <button mat-menu-item *ngFor="let h of hotels; let i = index" (click)="onSwitchHotel(h.id)"
                  [class.active-hotel]="h.id === activeHotel?.id">
                  <div class="hotel-card-item">
                    <div class="hotel-icon-container" [ngClass]="'icon-vibrant-' + (i % 5)">
                      <i class="fas fa-hotel"></i>
                    </div>
                    <div class="hotel-text-info">
                      <div class="hotel-primary-name">{{h.hotel_name}}</div>
                      <div class="hotel-secondary-info">{{h.city || 'Property Management'}}</div>
                    </div>
                    <div class="selected-indicator" *ngIf="h.id === activeHotel?.id">
                      <i class="fas fa-check-circle"></i>
                    </div>
                  </div>
                </button>
              </div>
              <mat-divider></mat-divider>
              <div class="menu-footer">
                <button mat-menu-item (click)="onAddNewHotel()" class="add-hotel-btn">
                  <i class="fas fa-plus-circle me-2"></i>
                  <span>Add New Property</span>
                </button>
              </div>
            </mat-menu>

            <!-- Main -->
            <li class="header">Main</li>

            <li *ngFor="let menuItem of menuItems" [routerLinkActive]="menuItem.submenu.length > 0 ? '' : 'active'" 
                [routerLinkActiveOptions]="{exact: true}">
              
              <!-- Root Item without Submenu -->
              <a *ngIf="menuItem.submenu.length === 0" [routerLink]="[menuItem.path]">
                <i class="material-icons">{{menuItem.icon}}</i>
                <span>{{menuItem.title}}</span>
              </a>

              <!-- Root Item with Submenu -->
              <a *ngIf="menuItem.submenu.length > 0" class="menu-toggle" (click)="toggleMenu($event)">
                <i class="material-icons">{{menuItem.icon}}</i>
                <span>{{menuItem.title}}</span>
              </a>

              <ul *ngIf="menuItem.submenu.length > 0" class="submenu">
                <li *ngFor="let subItem of menuItem.submenu" routerLinkActive="active">
                  <a [routerLink]="[subItem.path]">{{subItem.title}}</a>
                </li>
              </ul>
            </li>

          </ul>
        </ng-scrollbar>
      </div>

    </div>
  </aside>
</div>
