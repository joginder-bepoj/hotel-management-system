<h2 mat-dialog-title>{{ data.item ? 'Edit' : 'Add' }} Menu Item</h2>
<mat-dialog-content>
  <form [formGroup]="itemForm" class="mt-3">
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Item Name</mat-label>
          <input matInput formControlName="name" placeholder="Enter item name">
          <mat-error *ngIf="itemForm.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Category</mat-label>
          <mat-select formControlName="category">
            <mat-option *ngFor="let cat of categories" [value]="cat">{{cat}}</mat-option>
          </mat-select>
          <mat-error *ngIf="itemForm.get('category')?.hasError('required')">Category is required</mat-error>
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Price (₹)</mat-label>
          <input matInput type="number" formControlName="price" placeholder="Enter price">
          <mat-error *ngIf="itemForm.get('price')?.hasError('required')">Price is required</mat-error>
          <mat-error *ngIf="itemForm.get('price')?.hasError('min')">Price must be greater than 0</mat-error>
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-slide-toggle formControlName="isActive" color="primary">Available</mat-slide-toggle>
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onNoClick()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="itemForm.invalid" (click)="onSubmit()">
    {{ data.item ? 'Update' : 'Add' }}
  </button>
</mat-dialog-actions>
